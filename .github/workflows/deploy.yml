name: Deploy to EC2

# Triggers:
#   - manual dispatch only (run from the Actions tab or `gh workflow run`).
#
# Auto-deploy on push is DISABLED until the EC2 secrets are configured — the
# job was failing on every push ("missing server host") because EC2_HOST /
# EC2_USER / EC2_SSH_KEY were never set, which spammed failure emails. To
# re-enable auto-deploy: set those three repo secrets (EC2_HOST=app.myaipet.ai,
# EC2_USER=ubuntu, EC2_SSH_KEY=<cs_aipet.pem contents>, EC2_PORT=22) and add the
# `push:` trigger back. Deploys currently run manually via deploy/ec2-pull.sh.
on:
  workflow_dispatch:

# Single concurrent deploy; queue extras and cancel duplicates.
concurrency:
  group: ec2-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + bash deploy/ec2-pull.sh
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH into EC2 and run pull script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          # PETCLAW_ROOT defaults to /opt/petclaw — override with env var on EC2
          # if your checkout lives elsewhere.
          script: |
            set -euo pipefail
            cd "${PETCLAW_ROOT:-/opt/petclaw/aipet-project}"
            bash deploy/ec2-pull.sh

      - name: Smoke check (homepage 200)
        run: |
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://app.myaipet.ai/ || echo "000")
            echo "Attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "::error::Homepage did not return 200 after deploy"
          exit 1
