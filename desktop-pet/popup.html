<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 16px;
    }

    .header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .pet-avatar {
      width: 48px; height: 48px; border-radius: 14px;
      border: 2px solid rgba(251,191,36,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; background: rgba(251,191,36,0.08);
      overflow: hidden;
    }

    .pet-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .pet-info h2 {
      font-size: 16px; font-weight: 700; color: #fff;
      margin-bottom: 2px;
    }

    .pet-info .meta {
      font-size: 11px; color: #888;
      display: flex; gap: 8px;
    }

    .pet-info .meta span {
      padding: 1px 6px; border-radius: 6px;
      background: rgba(255,255,255,0.05);
    }

    .section { margin-bottom: 14px; }

    .section-title {
      font-size: 10px; font-weight: 700; color: #666;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .input-group {
      display: flex; gap: 6px; margin-bottom: 8px;
    }

    label {
      font-size: 11px; color: #999; margin-bottom: 3px; display: block;
    }

    input, select {
      width: 100%; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; background: rgba(255,255,255,0.04);
      color: #e0e0e0; font-size: 12px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: rgba(251,191,36,0.4);
    }

    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 10px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.1); }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #999; border: 1px solid rgba(255,255,255,0.08);
      margin-top: 6px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    .status {
      font-size: 11px; color: #4ade80; text-align: center;
      padding: 6px; display: none;
    }

    .status.error { color: #f87171; }

    .footer {
      text-align: center; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10px; color: #444;
    }

    .footer a { color: #f59e0b; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="pet-avatar" id="avatar">🐾</div>
    <div class="pet-info">
      <h2 id="petName">My Pet</h2>
      <div class="meta">
        <span id="petLevel">Lv.1</span>
        <span id="petPersonality">playful</span>
        <span id="petStatus">● online</span>
      </div>
    </div>
  </div>

  <!-- Points Dashboard -->
  <div class="section" style="background: linear-gradient(135deg, rgba(251,191,36,0.08), rgba(139,92,246,0.05)); border-radius: 12px; padding: 12px; margin-bottom: 14px; border: 1px solid rgba(251,191,36,0.15);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
      <div class="section-title" style="margin:0">Airdrop Points</div>
      <div id="totalPoints" style="font-size:20px; font-weight:800; color:#f59e0b; font-family:'Space Grotesk',monospace">0</div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:10px">
      <div style="background:rgba(0,0,0,0.2); padding:6px 8px; border-radius:8px">
        <div style="color:#888">💬 Chat</div>
        <div id="chatPoints" style="color:#4ade80; font-weight:700; font-size:13px">0</div>
      </div>
      <div style="background:rgba(0,0,0,0.2); padding:6px 8px; border-radius:8px">
        <div style="color:#888">💓 Heartbeat</div>
        <div id="heartbeatPoints" style="color:#60a5fa; font-weight:700; font-size:13px">0</div>
      </div>
      <div style="background:rgba(0,0,0,0.2); padding:6px 8px; border-radius:8px">
        <div style="color:#888">⚡ Skills</div>
        <div id="skillPoints" style="color:#a78bfa; font-weight:700; font-size:13px">0</div>
      </div>
      <div style="background:rgba(0,0,0,0.2); padding:6px 8px; border-radius:8px">
        <div style="color:#888">🌐 Browsing</div>
        <div id="browsingPoints" style="color:#f472b6; font-weight:700; font-size:13px">0</div>
      </div>
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:10px; color:#666">
      <span>🔥 Streak: <span id="streak" style="color:#f59e0b">0</span> days</span>
      <span>💬 Chats: <span id="chatCount" style="color:#4ade80">0</span></span>
      <span>⏱️ <span id="uptime" style="color:#60a5fa">0</span>m online</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Connection</div>
    <label>API Server URL</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:3000" />
    <div style="height:6px"></div>
    <label>Pet ID</label>
    <input type="number" id="petId" placeholder="1" min="1" />
  </div>

  <div class="section">
    <div class="section-title">Behavior</div>
    <label>Auto-talk interval (seconds)</label>
    <input type="number" id="autoInterval" placeholder="90" min="15" max="600" />
  </div>

  <div id="status" class="status"></div>

  <button class="btn btn-primary" id="saveBtn">Save & Connect</button>
  <button class="btn btn-secondary" id="exportBtn">📦 Export SOUL Data</button>
  <button class="btn btn-secondary" id="refreshBtn">🔄 Refresh Pet Info</button>

  <div class="footer">
    <p>MY AI PET — PetClaw v1</p>
    <p><a href="http://localhost:3000" target="_blank">Open Dashboard</a></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
